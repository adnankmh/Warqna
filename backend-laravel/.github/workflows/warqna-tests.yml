name: Warqna Tests

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sanitize checked-out source when used from monorepo root
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          if [ -f tools/sanitize_ci_workspace_v187.py ]; then
            python3 tools/sanitize_ci_workspace_v187.py --ci
          elif [ -f ../tools/sanitize_ci_workspace_v187.py ]; then
            python3 ../tools/sanitize_ci_workspace_v187.py --ci
          else
            rm -f .env backend-laravel/.env
          fi
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP syntax check
        run: find app config database routes tests -name "*.php" -print0 | xargs -0 -n1 php -l
      - name: JS syntax check
        run: node --check public/assets/js/app.js
