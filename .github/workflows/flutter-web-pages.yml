name: Build and deploy Flutter Web
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create platform folders
        working-directory: flutter_app
        run: flutter create . --platforms=web,android,ios --project-name warqna_mobile --org com.warqna
      - name: Get packages
        working-directory: flutter_app
        run: flutter pub get
      - name: Build web
        working-directory: flutter_app
        run: |
          API_URL="${{ vars.WARQNA_API_URL }}"
          EXTRA=""
          if [ -n "$API_URL" ]; then EXTRA="--dart-define=WARQNA_API_URL=$API_URL"; fi
          flutter analyze
          flutter build web --release --base-href "/${{ github.event.repository.name }}/" $EXTRA
      - uses: actions/upload-pages-artifact@v3
        with:
          path: flutter_app/build/web
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
