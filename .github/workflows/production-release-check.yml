name: Production Release Gate

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  secrets-and-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate source package and reject merge markers
        run: |
          python3 tools/test_clean_root_policy.py
          python3 tools/test_v170_contract.py
          python3 tools/test_v171_controller_references.py
          python3 tools/test_v172_brand_table_contract.py
          python3 tools/test_v173_online_engagement_contract.py
          python3 tools/test_v181_ci_regression_contract.py
          python3 tools/test_v182_rewards_contract.py
          python3 tools/test_v183_overhaul_contract.py
          python3 tools/test_v184_flutter_quality_contract.py
          python3 tools/test_v184_official_game_rules_contract.py
          python3 tools/test_v185_world_class_contract.py
          python3 tools/test_v186_engine_integrity_contract.py
          python3 tools/test_v187_global_offline_contract.py
          python3 tools/test_v174_offline_progression_navigation_contract.py
          python3 tools/test_v175_xp_challenges_pasha_designer_contract.py
          python3 tools/test_v176_daily_pack_inventory_contract.py
          python3 tools/test_v030_contract.py
          python3 tools/validate_v030_static.py
          python3 tools/test_v02_daily_prize_boxes_contract.py

      - name: Run standalone V183 engine regressions
        run: php backend-laravel/tools/test-v183-engine-overhaul.php
      - name: Run classic game-rule regressions
        run: php backend-laravel/tools/test-v142-rule-cores.php
      - name: Run V184 official game-rule audit
        run: php backend-laravel/tools/test-v184-official-rules-audit.php
      - name: Stress all registered game engines
        run: php backend-laravel/tools/test-v184-engine-stress.php
      - name: Audit all V187 20-game product engines
        run: php backend-laravel/tools/test-v186-engine-integrity.php

      - name: Verify V187 CI hardening
        run: python3 tools/verify_ci_hardening_v187.py
      - name: Run source preflight
        run: python3 tools/validate_release.py
      - name: Reject committed secrets and unsafe production defaults
        run: |
          if find . -path './.git' -prune -o -name '.env' -print | grep -q .; then
            echo 'A real .env file must not be committed.'; exit 1
          fi
          if grep -R --exclude='*.md' --exclude='*.example' --exclude='*.yml' --exclude='*.yaml' -nE '(AKIA[0-9A-Z]{16}|BEGIN (RSA|OPENSSH|EC) PRIVATE KEY)' .; then
            echo 'Possible secret detected.'; exit 1
          fi
          test -f backend-laravel/.env.production.example
          test -f backend-laravel/docker-compose.production.yml
          test -f backend-laravel/scripts/backup-production.sh
          test -f flutter_app/web/manifest.json -o -f flutter_app/web/manifest.webmanifest
      - name: Verify release version consistency
        run: |
          python3 tools/verify_release_versions.py
          grep -q '"license": "proprietary"' backend-laravel/composer.json
          grep -q 'cp .env.production.example .env' .github/workflows/backend-ci.yml
          grep -q 'rm -f .env' .github/workflows/backend-ci.yml
